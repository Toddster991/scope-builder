<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Sheet Assignment Test v2</title>
<script src="https://cdn.jsdelivr.net/npm/pdfjs-dist@2.16.105/build/pdf.min.js"></script>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;background:#f0efe9;height:100vh;overflow:hidden;display:flex;flex-direction:column}

.topbar{background:#fff;border-bottom:1px solid rgba(0,0,0,.12);padding:0 20px;height:48px;display:flex;align-items:center;justify-content:space-between;flex-shrink:0}
.topbar h1{font-size:15px;font-weight:700}
.topbar-hint{font-size:12px;color:#888}

.workspace{flex:1;display:grid;grid-template-columns:1fr 380px;overflow:hidden}

/* LEFT — thumbnails */
.thumb-panel{background:#f7f7f5;border-right:1px solid rgba(0,0,0,.12);display:flex;flex-direction:column;overflow:hidden}
.thumb-panel-head{padding:12px 16px;border-bottom:1px solid rgba(0,0,0,.12);background:#fff;flex-shrink:0;display:flex;align-items:center;justify-content:space-between}
.thumb-panel-title{font-size:13px;font-weight:600;color:#1a1a18}
.thumb-panel-sub{font-size:11px;color:#888;margin-top:2px}
.thumb-grid{flex:1;overflow-y:auto;padding:16px;display:grid;grid-template-columns:repeat(auto-fill,minmax(260px,1fr));gap:14px;align-content:start}

.thumb-item{
  position:relative;border:2px solid #ddd;border-radius:8px;overflow:hidden;
  background:#fff;box-shadow:0 1px 4px rgba(0,0,0,.1);
  cursor:grab;transition:border-color .15s,box-shadow .15s,opacity .2s;
  user-select:none;
}
.thumb-item:hover{border-color:#185fa5;box-shadow:0 3px 12px rgba(24,95,165,.2)}
.thumb-item.assigned{opacity:0.45}
.thumb-item.dragging-active{opacity:0.3}
.thumb-item canvas{display:block;width:100%;height:auto}
.thumb-item .page-label{font-size:11px;font-weight:600;color:#555;text-align:center;padding:5px 4px;background:#fff;border-top:1px solid #eee}
.assigned-badge{
  position:absolute;top:0;left:0;right:0;
  background:rgba(24,95,165,.88);color:#fff;
  font-size:10px;font-weight:600;padding:4px 8px;
  text-align:center;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;
  display:none;
}
.thumb-item.assigned .assigned-badge{display:block}
.view-btn{
  position:absolute;bottom:28px;right:6px;
  background:rgba(0,0,0,.6);color:#fff;border:none;border-radius:5px;
  padding:3px 8px;font-size:10px;cursor:pointer;
  opacity:0;transition:opacity .15s;z-index:2;
}
.thumb-item:hover .view-btn{opacity:1}

/* RIGHT — categories */
.cat-panel{background:#fff;display:flex;flex-direction:column;overflow:hidden}
.cat-panel-head{
  padding:12px 16px;border-bottom:1px solid rgba(0,0,0,.12);
  font-size:13px;font-weight:600;color:#1a1a18;
  flex-shrink:0;background:#fff;
}
.cat-scroll{flex:1;overflow-y:auto;padding:8px 12px 16px}

.cat-group{margin-bottom:4px}
.cat-group-label{
  font-size:9px;font-weight:700;color:#9a9994;
  text-transform:uppercase;letter-spacing:.08em;
  padding:8px 4px 4px;
}

.cat-block{
  border:1px solid rgba(0,0,0,.1);border-radius:8px;
  overflow:hidden;margin-bottom:6px;background:#fafaf8;
}
.cat-block-head{
  display:flex;align-items:center;gap:8px;
  padding:7px 10px;background:#f0efe9;border-bottom:1px solid rgba(0,0,0,.08);
}
.cat-dot{width:9px;height:9px;border-radius:50%;flex-shrink:0}
.cat-block-name{font-size:12px;font-weight:600;color:#1a1a18;flex:1}
.add-sheet-btn{
  font-size:10px;padding:2px 8px;border-radius:10px;
  border:1px solid rgba(0,0,0,.15);background:#fff;
  color:#555;cursor:pointer;white-space:nowrap;
  transition:all .1s;
}
.add-sheet-btn:hover{border-color:#185fa5;color:#185fa5}

.sheet-rows{padding:4px 8px}

.sheet-row{
  display:flex;align-items:center;gap:6px;
  padding:4px 6px;border-radius:5px;margin-bottom:3px;
  border:1.5px solid rgba(0,0,0,.1);background:#fff;
  min-height:32px;transition:all .15s;
}
.sheet-row.drag-over{background:#e6f1fb;border-color:#185fa5;border-style:solid}
.sheet-row.has-page{border-color:transparent;background:#f0f8f0}

.sheet-name-input{
  flex:1;font-size:12px;border:none;background:transparent;
  outline:none;color:#1a1a18;min-width:0;
  padding:0;font-family:inherit;
}
.sheet-name-input::placeholder{color:#bbb}

.pg-badge{
  font-size:10px;font-weight:600;padding:2px 7px;
  border-radius:10px;white-space:nowrap;flex-shrink:0;
}
.drop-hint{font-size:10px;color:#ccc;white-space:nowrap;flex-shrink:0}
.remove-btn{
  background:none;border:none;cursor:pointer;
  color:#bbb;font-size:14px;line-height:1;
  padding:0 2px;flex-shrink:0;transition:color .1s;
}
.remove-btn:hover{color:#a32d2d}

.new-drop-zone{
  border:1.5px dashed rgba(0,0,0,.12);border-radius:5px;
  padding:5px 8px;margin-bottom:3px;
  font-size:10px;color:#bbb;text-align:center;
  transition:all .15s;
}
.new-drop-zone.drag-over{background:#e6f1fb;border-color:#185fa5;color:#185fa5;border-style:solid}

/* Upload zone */
.upload-zone{
  grid-column:1/-1;border:2px dashed #ccc;border-radius:12px;
  padding:40px;text-align:center;cursor:pointer;
  transition:all .15s;background:#fff;
}
.upload-zone:hover{border-color:#185fa5;background:#e6f1fb}

/* Full view */
#full-viewer{position:fixed;inset:0;background:rgba(0,0,0,.85);z-index:100;display:none;flex-direction:column}
#full-viewer.open{display:flex}
.viewer-bar{padding:10px 20px;background:#1a1a18;color:#fff;display:flex;align-items:center;justify-content:space-between;flex-shrink:0}
.viewer-body{flex:1;overflow:auto;background:#525659;display:flex;justify-content:center;padding:20px}
.viewer-body img{max-width:100%;height:auto;box-shadow:0 4px 24px rgba(0,0,0,.5);background:#fff}

.spinner{display:inline-block;width:13px;height:13px;border:2px solid rgba(0,0,0,.1);border-top-color:#185fa5;border-radius:50%;animation:spin .7s linear infinite;vertical-align:middle;margin-right:5px}
@keyframes spin{to{transform:rotate(360deg)}}
</style>
</head>
<body>

<div class="topbar">
  <h1>Sheet Assignment Test v2</h1>
  <span class="topbar-hint" id="topbar-hint">Upload a plan set PDF to begin</span>
</div>

<div class="workspace">
  <div class="thumb-panel">
    <div class="thumb-panel-head">
      <div>
        <div class="thumb-panel-title" id="panel-title">Plan Set Pages</div>
        <div class="thumb-panel-sub" id="panel-sub">Upload a PDF to see thumbnails</div>
      </div>
      <button onclick="document.getElementById('pdf-input').click()"
        style="font-size:11px;padding:4px 10px;border-radius:6px;border:1px solid #ccc;background:#fff;cursor:pointer;color:#555">
        ↑ Upload
      </button>
    </div>
    <div class="thumb-grid" id="thumb-grid">
      <div class="upload-zone" onclick="document.getElementById('pdf-input').click()">
        <div style="font-size:32px;margin-bottom:8px">📄</div>
        <div style="font-size:14px;font-weight:500;color:#555">Click to upload plan set PDF</div>
        <div style="font-size:12px;color:#888;margin-top:4px">All floors, elevations, site plan in one file</div>
      </div>
    </div>
  </div>

  <div class="cat-panel">
    <div class="cat-panel-head">Drawing Categories — drag pages here</div>
    <div class="cat-scroll" id="cat-scroll"></div>
  </div>
</div>

<div id="full-viewer">
  <div class="viewer-bar">
    <span id="viewer-title" style="font-size:14px;font-weight:600"></span>
    <button onclick="closeViewer()" style="background:#555;color:#fff;border:none;border-radius:6px;padding:6px 16px;cursor:pointer;font-size:13px">✕ Close</button>
  </div>
  <div class="viewer-body" id="viewer-body"></div>
</div>

<input type="file" id="pdf-input" accept=".pdf" style="display:none">

<script>
pdfjsLib.GlobalWorkerOptions.workerSrc = 'https://cdn.jsdelivr.net/npm/pdfjs-dist@2.16.105/build/pdf.worker.min.js';

const GROUPS = [
  { label:'Existing', cats:[
    {id:'existing-plans',      name:'Existing Plans',          color:'#5F5E5A'},
    {id:'existing-elevations', name:'Existing Elevations',     color:'#5F5E5A'},
  ]},
  { label:'Proposed', cats:[
    {id:'floors',              name:'Floor Plans',             color:'#185FA5'},
    {id:'elevations',          name:'Elevations',              color:'#534AB7'},
    {id:'site',                name:'Site Plan',               color:'#3B6D11'},
    {id:'interior-elevations', name:'Interior Elevations',     color:'#D4537E'},
  ]},
  { label:'Engineering', cats:[
    {id:'electrical',          name:'Electrical Plans',        color:'#EF9F27'},
    {id:'mechanical',          name:'Mechanical / Plumbing',   color:'#1D9E75'},
    {id:'structural',          name:'Structural',              color:'#712B13'},
  ]},
  { label:'Other', cats:[
    {id:'landscape',           name:'Landscape',               color:'#3B6D11'},
    {id:'details',             name:'Details',                 color:'#888780'},
    {id:'sections',            name:'Sections',                color:'#888780'},
    {id:'schedules',           name:'Door / Window Schedules', color:'#083344'},
  ]},
];

// assignments: { catId: [ {id, name, pageIndex}, ... ] }
let assignments = {};
let pdfDoc = null;

function uid(){ return 'sh-' + Date.now() + '-' + Math.floor(Math.random()*9999); }
function hexToRgb(hex){
  return `${parseInt(hex.slice(1,3),16)},${parseInt(hex.slice(3,5),16)},${parseInt(hex.slice(5,7),16)}`;
}
function getCatSheets(catId){
  if(!assignments[catId]) assignments[catId] = [];
  return assignments[catId];
}

/* ── Build category panel ── */
function buildCatList(){
  const scroll = document.getElementById('cat-scroll');
  let html = '';
  GROUPS.forEach(g => {
    html += `<div class="cat-group"><div class="cat-group-label">${g.label}</div>`;
    g.cats.forEach(cat => {
      const sheets = getCatSheets(cat.id);
      const rgb = hexToRgb(cat.color);
      html += `<div class="cat-block">
        <div class="cat-block-head">
          <div class="cat-dot" style="background:${cat.color}"></div>
          <div class="cat-block-name">${cat.name}</div>
          <button class="add-sheet-btn" onclick="addSheet('${cat.id}')">+ Add sheet</button>
        </div>
        <div class="sheet-rows" id="sheets-${cat.id}">`;

      sheets.forEach(sheet => {
        const hasPg = sheet.pageIndex !== null && sheet.pageIndex !== undefined;
        html += `<div class="sheet-row ${hasPg?'has-page':''}" id="sheet-${sheet.id}"
          ondragover="dragOver(event,this)" ondragleave="dragLeave(this)" ondrop="dropOnSheet(event,'${cat.id}','${sheet.id}')">
          <input class="sheet-name-input" value="${sheet.name.replace(/"/g,'&quot;')}"
            onchange="renameSheet('${cat.id}','${sheet.id}',this.value)"
            placeholder="Sheet name">
          ${hasPg
            ? `<span class="pg-badge" style="background:rgba(${rgb},.15);color:${cat.color}">Page ${sheet.pageIndex+1}</span>
               <button class="remove-btn" onclick="unassignSheet('${cat.id}','${sheet.id}')" title="Remove page">×</button>`
            : `<span class="drop-hint">drop page</span>
               <button class="remove-btn" onclick="removeSheet('${cat.id}','${sheet.id}')" title="Remove sheet">×</button>`
          }
        </div>`;
      });

      // Drop zone to create a new sheet
      html += `<div class="new-drop-zone" 
        ondragover="dragOver(event,this)" ondragleave="dragLeave(this)" ondrop="dropNewSheet(event,'${cat.id}')">
        + drop page to add new sheet
      </div>`;

      html += `</div></div>`;
    });
    html += '</div>';
  });
  scroll.innerHTML = html;
}

/* ── Sheet management ── */
function addSheet(catId){
  const cat = GROUPS.flatMap(g=>g.cats).find(c=>c.id===catId);
  const sheets = getCatSheets(catId);
  sheets.push({ id:uid(), name:cat.name + ' ' + (sheets.length+1), pageIndex:null });
  buildCatList();
  updateThumbStates();
}

function removeSheet(catId, sheetId){
  assignments[catId] = getCatSheets(catId).filter(s=>s.id!==sheetId);
  buildCatList();
  updateThumbStates();
}

function renameSheet(catId, sheetId, name){
  const s = getCatSheets(catId).find(x=>x.id===sheetId);
  if(s) s.name = name;
}

function unassignSheet(catId, sheetId){
  const s = getCatSheets(catId).find(x=>x.id===sheetId);
  if(s){ s.pageIndex = null; }
  buildCatList();
  updateThumbStates();
}

/* ── Drag handlers ── */
function dragOver(e, el){
  e.preventDefault();
  el.classList.add('drag-over');
}
function dragLeave(el){
  el.classList.remove('drag-over');
}
function dropOnSheet(e, catId, sheetId){
  e.preventDefault();
  document.getElementById('sheet-'+sheetId)?.classList.remove('drag-over');
  const pageIdx = parseInt(e.dataTransfer.getData('text/plain'));
  if(isNaN(pageIdx)) return;
  const s = getCatSheets(catId).find(x=>x.id===sheetId);
  if(s){ s.pageIndex = pageIdx; }
  buildCatList();
  updateThumbStates();
}
function dropNewSheet(e, catId){
  e.preventDefault();
  const pageIdx = parseInt(e.dataTransfer.getData('text/plain'));
  if(isNaN(pageIdx)) return;
  const cat = GROUPS.flatMap(g=>g.cats).find(c=>c.id===catId);
  const sheets = getCatSheets(catId);
  sheets.push({ id:uid(), name:cat.name + ' ' + (sheets.length+1), pageIndex:pageIdx });
  buildCatList();
  updateThumbStates();
}

/* ── Update thumb visual state ── */
function updateThumbStates(){
  // Build map of pageIndex -> sheet names
  const labels = {};
  Object.entries(assignments).forEach(([catId, sheets]) => {
    sheets.forEach(s => {
      if(s.pageIndex !== null && s.pageIndex !== undefined){
        if(!labels[s.pageIndex]) labels[s.pageIndex] = [];
        labels[s.pageIndex].push(s.name);
      }
    });
  });
  const assignedPages = new Set(Object.keys(labels).map(Number));

  document.querySelectorAll('.thumb-item').forEach(item => {
    const pg = parseInt(item.dataset.page);
    const badge = item.querySelector('.assigned-badge');
    if(assignedPages.has(pg)){
      item.classList.add('assigned');
      if(badge) badge.textContent = labels[pg].join(', ');
    } else {
      item.classList.remove('assigned');
      if(badge) badge.textContent = '';
    }
  });
}

/* ── PDF Upload ── */
document.getElementById('pdf-input').addEventListener('change', async function(e){
  const file = e.target.files[0]; if(!file) return;
  assignments = {};
  document.getElementById('thumb-grid').innerHTML =
    '<div style="grid-column:1/-1;padding:20px;font-size:13px;color:#888"><span class="spinner"></span>Loading PDF...</div>';
  document.getElementById('panel-title').textContent = file.name;
  document.getElementById('topbar-hint').textContent = 'Drag page thumbnails onto category sheets →';
  buildCatList();

  const buf = await file.arrayBuffer();
  pdfDoc = await pdfjsLib.getDocument({ data: new Uint8Array(buf) }).promise;
  document.getElementById('panel-sub').textContent = pdfDoc.numPages + ' pages — drag onto categories →';
  document.getElementById('thumb-grid').innerHTML = '';

  for(let i=1; i<=pdfDoc.numPages; i++){
    const page = await pdfDoc.getPage(i);
    const base = page.getViewport({scale:1});
    const scale = (260 * 2.5) / base.width;
    const vp = page.getViewport({scale});
    const c = document.createElement('canvas');
    c.width = Math.floor(vp.width); c.height = Math.floor(vp.height);
    await page.render({canvasContext:c.getContext('2d'),viewport:vp}).promise;

    const item = document.createElement('div');
    item.className = 'thumb-item';
    item.draggable = true;
    item.dataset.page = String(i-1);

    item.addEventListener('dragstart', ev => {
      ev.dataTransfer.setData('text/plain', String(i-1));
      ev.dataTransfer.effectAllowed = 'copy';
      item.classList.add('dragging-active');
    });
    item.addEventListener('dragend', () => item.classList.remove('dragging-active'));

    const badge = document.createElement('div'); badge.className='assigned-badge';
    const viewBtn = document.createElement('button'); viewBtn.className='view-btn';
    viewBtn.textContent = '⤢ Full view';
    viewBtn.addEventListener('click', async ev => { ev.stopPropagation(); await openViewer(i); });
    const lbl = document.createElement('div'); lbl.className='page-label';
    lbl.textContent = 'Page ' + i;

    item.appendChild(badge); item.appendChild(c); item.appendChild(viewBtn); item.appendChild(lbl);
    document.getElementById('thumb-grid').appendChild(item);
  }
  document.getElementById('topbar-hint').textContent = pdfDoc.numPages + ' pages — drag onto categories →';
  this.value = '';
});

/* ── Full view ── */
async function openViewer(pageNum){
  if(!pdfDoc) return;
  document.getElementById('viewer-title').textContent = 'Page ' + pageNum + ' — rendering...';
  document.getElementById('viewer-body').innerHTML = '<div style="color:#fff;padding:40px"><span class="spinner"></span>Rendering...</div>';
  document.getElementById('full-viewer').classList.add('open');
  const page = await pdfDoc.getPage(pageNum);
  const vp = page.getViewport({scale:4.0});
  const c = document.createElement('canvas');
  c.width = Math.floor(vp.width); c.height = Math.floor(vp.height);
  await page.render({canvasContext:c.getContext('2d'),viewport:vp}).promise;
  c.toBlob(blob => {
    const img = document.createElement('img');
    img.src = URL.createObjectURL(blob);
    document.getElementById('viewer-body').innerHTML = '';
    document.getElementById('viewer-body').appendChild(img);
    document.getElementById('viewer-title').textContent = 'Page ' + pageNum;
  }, 'image/png');
}

function closeViewer(){
  document.getElementById('full-viewer').classList.remove('open');
  document.getElementById('viewer-body').innerHTML = '';
}
document.getElementById('full-viewer').addEventListener('click', function(e){
  if(e.target===this||e.target===document.getElementById('viewer-body')) closeViewer();
});
document.addEventListener('keydown', e => { if(e.key==='Escape') closeViewer(); });

/* ── Init ── */
buildCatList();
</script>
</body>
</html>
