<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Room Drawing Tool Test</title>
<script src="https://cdn.jsdelivr.net/npm/pdfjs-dist@2.16.105/build/pdf.min.js"></script>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;background:#f0efe9;height:100vh;overflow:hidden;display:flex;flex-direction:column}

.topbar{background:#fff;border-bottom:1px solid rgba(0,0,0,.12);padding:0 16px;height:48px;display:flex;align-items:center;gap:10px;flex-shrink:0}
.topbar h1{font-size:14px;font-weight:700;margin-right:8px}
.divider{width:1px;height:24px;background:rgba(0,0,0,.12);margin:0 4px}

.tool-btn{
  padding:5px 12px;font-size:12px;font-weight:500;
  border-radius:6px;border:1.5px solid rgba(0,0,0,.15);
  background:#fff;color:#333;cursor:pointer;
  display:flex;align-items:center;gap:5px;
  transition:all .1s;white-space:nowrap;
}
.tool-btn:hover{background:#f0efe9;border-color:rgba(0,0,0,.25)}
.tool-btn.active{background:#185fa5;color:#fff;border-color:#185fa5}
.tool-btn.danger:hover{background:#fcebeb;color:#a32d2d;border-color:#f09595}
.tool-btn.success{background:#3b6d11;color:#eaf3de;border-color:#3b6d11}
.tool-btn.success:hover{background:#2d5209}

.tool-hint{font-size:11px;color:#888;margin-left:auto}

.workspace{flex:1;overflow:hidden;display:flex;flex-direction:column}
.upload-area{flex:1;display:flex;align-items:center;justify-content:center}
.upload-zone{
  border:2px dashed #ccc;border-radius:12px;padding:40px 60px;
  text-align:center;cursor:pointer;transition:all .15s;background:#fff;
}
.upload-zone:hover{border-color:#185fa5;background:#e6f1fb}

.canvas-wrap{flex:1;overflow:auto;background:#525659;display:flex;align-items:flex-start;justify-content:flex-start;padding:20px}
.canvas-container{position:relative;flex-shrink:0;line-height:0}
#pdf-canvas{display:block}
#draw-canvas{position:absolute;top:0;left:0}

/* Rooms overlay */
.room-overlay{position:absolute;top:0;left:0;width:100%;height:100%;pointer-events:none}

/* Name modal */
.name-modal-backdrop{
  position:fixed;inset:0;background:rgba(0,0,0,.4);
  z-index:200;display:flex;align-items:center;justify-content:center;
}
.name-modal{
  background:#fff;border-radius:10px;padding:20px;width:320px;
  box-shadow:0 8px 32px rgba(0,0,0,.2);
}
.name-modal h3{font-size:14px;font-weight:600;margin-bottom:12px}
.name-modal input{
  width:100%;padding:8px 10px;font-size:13px;border:1.5px solid #ddd;
  border-radius:6px;outline:none;font-family:inherit;
}
.name-modal input:focus{border-color:#185fa5}
.name-modal-footer{display:flex;justify-content:flex-end;gap:8px;margin-top:14px}

.spinner{display:inline-block;width:13px;height:13px;border:2px solid rgba(255,255,255,.3);border-top-color:#fff;border-radius:50%;animation:spin .7s linear infinite;vertical-align:middle;margin-right:5px}
@keyframes spin{to{transform:rotate(360deg)}}

/* Room list sidebar */
.room-list-panel{
  position:fixed;right:0;top:48px;bottom:0;width:220px;
  background:#fff;border-left:1px solid rgba(0,0,0,.12);
  display:flex;flex-direction:column;z-index:10;
  transform:translateX(100%);transition:transform .2s;
}
.room-list-panel.open{transform:translateX(0)}
.rlp-head{padding:10px 14px;border-bottom:1px solid rgba(0,0,0,.1);font-size:12px;font-weight:600;color:#333}
.rlp-body{flex:1;overflow-y:auto;padding:8px}
.room-list-item{
  display:flex;align-items:center;gap:8px;padding:6px 8px;
  border-radius:6px;cursor:pointer;margin-bottom:2px;
  transition:background .1s;font-size:12px;
}
.room-list-item:hover{background:#f0efe9}
.room-list-item.selected{background:#e6f1fb;color:#185fa5;font-weight:500}
.rl-dot{width:8px;height:8px;border-radius:50%;flex-shrink:0}
.rl-name{flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.rl-del{background:none;border:none;cursor:pointer;color:#bbb;font-size:14px;padding:0 2px;line-height:1}
.rl-del:hover{color:#a32d2d}
</style>
</head>
<body>

<div class="topbar">
  <h1>Room Drawing Tool</h1>
  <div class="divider"></div>

  <!-- Mode buttons -->
  <button class="tool-btn active" id="btn-rect" onclick="setMode('rect')" title="Draw rectangle">
    ▭ Rectangle
  </button>
  <button class="tool-btn" id="btn-poly" onclick="setMode('poly')" title="Click to place points, double-click to close">
    ⬡ Polygon
  </button>

  <div class="divider"></div>

  <button class="tool-btn" id="btn-select" onclick="setMode('select')" title="Select and modify rooms">
    ↖ Select
  </button>
  <button class="tool-btn danger" id="btn-delete" onclick="deleteSelected()" title="Delete selected room (Del)">
    🗑 Delete
  </button>

  <div class="divider"></div>

  <button class="tool-btn" id="btn-rooms" onclick="toggleRoomList()">
    ☰ Rooms (<span id="room-count">0</span>)
  </button>

  <div class="divider"></div>

  <button class="tool-btn success" onclick="saveRooms()">✓ Save rooms</button>

  <span class="tool-hint" id="tool-hint">Upload a PDF to start drawing</span>

  <input type="file" id="pdf-input" accept=".pdf" style="display:none" onchange="loadPDF(event)">
  <button class="tool-btn" onclick="document.getElementById('pdf-input').click()" style="margin-left:4px">↑ Load PDF</button>
</div>

<div class="workspace" id="workspace">
  <div class="upload-area" id="upload-area">
    <div class="upload-zone" onclick="document.getElementById('pdf-input').click()">
      <div style="font-size:36px;margin-bottom:10px">📐</div>
      <div style="font-size:15px;font-weight:600;color:#333;margin-bottom:4px">Load a floor plan PDF</div>
      <div style="font-size:12px;color:#888">Then draw room boundaries on top of it</div>
    </div>
  </div>
</div>

<!-- Room list sidebar -->
<div class="room-list-panel" id="room-list-panel">
  <div class="rlp-head">Rooms</div>
  <div class="rlp-body" id="rlp-body"></div>
</div>

<!-- Name prompt modal -->
<div class="name-modal-backdrop" id="name-modal" style="display:none">
  <div class="name-modal">
    <h3 id="name-modal-title">Name this room</h3>
    <input type="text" id="name-input" placeholder="e.g. Kitchen, Master Bath..." autofocus>
    <div class="name-modal-footer">
      <button class="tool-btn" onclick="cancelNameModal()">Cancel</button>
      <button class="tool-btn active" onclick="confirmName()">Add room</button>
    </div>
  </div>
</div>

<script>
pdfjsLib.GlobalWorkerOptions.workerSrc = 'https://cdn.jsdelivr.net/npm/pdfjs-dist@2.16.105/build/pdf.worker.min.js';

/* ════ STATE ════ */
const ROOM_COLOR = '#185FA5';
const FILL_ALPHA = 0.15;
const SELECTED_ALPHA = 0.28;
const HANDLE_SIZE = 8;

let mode = 'rect'; // rect | poly | select
let rooms = []; // {id, name, type:'rect'|'poly', ...shape data}
let selectedId = null;
let pdfDoc = null;
let pdfScale = 1.5;
let pdfWidth = 0, pdfHeight = 0;

// Drawing state
let drawing = false;
let drawStart = {x:0, y:0};
let drawCurrent = {x:0, y:0};
let polyPoints = []; // for polygon mode

// Drag/resize state
let dragging = false;
let dragType = null; // 'move' | 'handle-N/NE/E/SE/S/SW/W/NW'
let dragStart = {x:0, y:0};
let dragOrigShape = null;

// Pending shape waiting for name
let pendingShape = null;

function uid(){ return 'r-' + Date.now() + '-' + Math.floor(Math.random()*9999); }

/* ════ PDF LOAD ════ */
async function loadPDF(e) {
  const file = e.target.files[0]; if(!file) return;
  setHint('<span class="spinner"></span>Loading PDF...');
  const buf = await file.arrayBuffer();
  pdfDoc = await pdfjsLib.getDocument({data: new Uint8Array(buf)}).promise;
  await renderPage(1);
  e.target.value = '';
}

async function renderPage(pageNum) {
  const page = await pdfDoc.getPage(pageNum);
  const vp = page.getViewport({scale: pdfScale});
  pdfWidth = Math.floor(vp.width);
  pdfHeight = Math.floor(vp.height);

  document.getElementById('upload-area')?.remove();

  // Build canvas container
  const workspace = document.getElementById('workspace');
  workspace.innerHTML = `<div class="canvas-wrap" id="canvas-wrap">
    <div class="canvas-container" id="canvas-container">
      <canvas id="pdf-canvas" width="${pdfWidth}" height="${pdfHeight}"></canvas>
      <canvas id="draw-canvas" width="${pdfWidth}" height="${pdfHeight}"></canvas>
    </div>
  </div>`;

  const pdfCanvas = document.getElementById('pdf-canvas');
  await page.render({canvasContext: pdfCanvas.getContext('2d'), viewport: vp}).promise;

  // Wire draw canvas events
  const dc = document.getElementById('draw-canvas');
  dc.addEventListener('mousedown', onMouseDown);
  dc.addEventListener('mousemove', onMouseMove);
  dc.addEventListener('mouseup', onMouseUp);
  dc.addEventListener('dblclick', onDblClick);

  document.addEventListener('keydown', onKeyDown);

  setHint('Rectangle mode — drag to draw a room');
  redraw();
}

/* ════ DRAW CANVAS ════ */
function getCanvas(){ return document.getElementById('draw-canvas'); }
function getCtx(){ return getCanvas()?.getContext('2d'); }

function redraw() {
  const c = getCanvas(); if(!c) return;
  const ctx = getCtx();
  ctx.clearRect(0,0,pdfWidth,pdfHeight);

  // Draw all rooms
  rooms.forEach(r => {
    const isSelected = r.id === selectedId;
    drawRoom(ctx, r, isSelected);
  });

  // Draw in-progress shape
  if(drawing && mode === 'rect') {
    const x = Math.min(drawStart.x, drawCurrent.x);
    const y = Math.min(drawStart.y, drawCurrent.y);
    const w = Math.abs(drawCurrent.x - drawStart.x);
    const h = Math.abs(drawCurrent.y - drawStart.y);
    ctx.fillStyle = `rgba(24,95,165,${FILL_ALPHA})`;
    ctx.strokeStyle = '#185FA5';
    ctx.lineWidth = 2;
    ctx.setLineDash([6,3]);
    ctx.fillRect(x,y,w,h);
    ctx.strokeRect(x,y,w,h);
    ctx.setLineDash([]);
  }

  // Draw polygon in progress
  if(mode === 'poly' && polyPoints.length > 0) {
    ctx.beginPath();
    ctx.moveTo(polyPoints[0].x, polyPoints[0].y);
    polyPoints.forEach((p,i) => { if(i>0) ctx.lineTo(p.x,p.y); });
    if(drawing) ctx.lineTo(drawCurrent.x, drawCurrent.y);
    ctx.strokeStyle = '#185FA5';
    ctx.lineWidth = 2;
    ctx.setLineDash([6,3]);
    ctx.stroke();
    ctx.setLineDash([]);
    // Draw points
    polyPoints.forEach(p => {
      ctx.beginPath();
      ctx.arc(p.x, p.y, 5, 0, Math.PI*2);
      ctx.fillStyle = '#185FA5';
      ctx.fill();
      ctx.strokeStyle = '#fff';
      ctx.lineWidth = 1.5;
      ctx.stroke();
    });
  }
}

function drawRoom(ctx, r, isSelected) {
  ctx.save();
  const alpha = isSelected ? SELECTED_ALPHA : FILL_ALPHA;
  ctx.fillStyle = `rgba(24,95,165,${alpha})`;
  ctx.strokeStyle = isSelected ? '#0c447c' : '#185FA5';
  ctx.lineWidth = isSelected ? 2.5 : 2;

  if(r.type === 'rect') {
    ctx.fillRect(r.x, r.y, r.w, r.h);
    ctx.strokeRect(r.x, r.y, r.w, r.h);
    // Label
    drawLabel(ctx, r.name, r.x + r.w/2, r.y + r.h/2, isSelected);
    // Handles if selected
    if(isSelected) drawRectHandles(ctx, r);
  } else if(r.type === 'poly') {
    ctx.beginPath();
    r.points.forEach((p,i) => i===0 ? ctx.moveTo(p.x,p.y) : ctx.lineTo(p.x,p.y));
    ctx.closePath();
    ctx.fill();
    ctx.stroke();
    // Label at centroid
    const cx = r.points.reduce((s,p)=>s+p.x,0)/r.points.length;
    const cy = r.points.reduce((s,p)=>s+p.y,0)/r.points.length;
    drawLabel(ctx, r.name, cx, cy, isSelected);
    // Handles if selected
    if(isSelected) drawPolyHandles(ctx, r);
  }
  ctx.restore();
}

function drawLabel(ctx, name, cx, cy, isSelected) {
  ctx.font = `bold ${13}px -apple-system,sans-serif`;
  ctx.textAlign = 'center';
  ctx.textBaseline = 'middle';
  const metrics = ctx.measureText(name);
  const pad = 6;
  const bw = metrics.width + pad*2, bh = 20;
  ctx.fillStyle = isSelected ? 'rgba(12,68,124,0.85)' : 'rgba(24,95,165,0.75)';
  ctx.beginPath();
  ctx.roundRect(cx - bw/2, cy - bh/2, bw, bh, 4);
  ctx.fill();
  ctx.fillStyle = '#fff';
  ctx.fillText(name, cx, cy);
}

function drawRectHandles(ctx, r) {
  const handles = getRectHandlePositions(r);
  handles.forEach(h => {
    ctx.fillStyle = '#fff';
    ctx.strokeStyle = '#185fa5';
    ctx.lineWidth = 1.5;
    ctx.fillRect(h.x - HANDLE_SIZE/2, h.y - HANDLE_SIZE/2, HANDLE_SIZE, HANDLE_SIZE);
    ctx.strokeRect(h.x - HANDLE_SIZE/2, h.y - HANDLE_SIZE/2, HANDLE_SIZE, HANDLE_SIZE);
  });
}

function drawPolyHandles(ctx, r) {
  r.points.forEach(p => {
    ctx.fillStyle = '#fff';
    ctx.strokeStyle = '#185fa5';
    ctx.lineWidth = 1.5;
    ctx.beginPath();
    ctx.arc(p.x, p.y, HANDLE_SIZE/2+1, 0, Math.PI*2);
    ctx.fill(); ctx.stroke();
  });
}

function getRectHandlePositions(r) {
  const {x,y,w,h} = r;
  return [
    {name:'NW', x:x,      y:y},
    {name:'N',  x:x+w/2,  y:y},
    {name:'NE', x:x+w,    y:y},
    {name:'E',  x:x+w,    y:y+h/2},
    {name:'SE', x:x+w,    y:y+h},
    {name:'S',  x:x+w/2,  y:y+h},
    {name:'SW', x:x,      y:y+h},
    {name:'W',  x:x,      y:y+h/2},
  ];
}

function getCursorForHandle(name) {
  const map = {N:'n-resize',NE:'ne-resize',E:'e-resize',SE:'se-resize',S:'s-resize',SW:'sw-resize',W:'w-resize',NW:'nw-resize'};
  return map[name] || 'pointer';
}

/* ════ HIT TESTING ════ */
function hitTestHandle(room, mx, my) {
  if(room.type === 'rect') {
    const handles = getRectHandlePositions(room);
    for(const h of handles) {
      if(Math.abs(mx-h.x) <= HANDLE_SIZE && Math.abs(my-h.y) <= HANDLE_SIZE)
        return h.name;
    }
  } else if(room.type === 'poly') {
    for(let i=0; i<room.points.length; i++) {
      const p = room.points[i];
      if(Math.abs(mx-p.x) <= HANDLE_SIZE+2 && Math.abs(my-p.y) <= HANDLE_SIZE+2)
        return 'POLY-' + i;
    }
  }
  return null;
}

function hitTestRoom(mx, my) {
  // Test in reverse order (topmost first)
  for(let i=rooms.length-1; i>=0; i--) {
    const r = rooms[i];
    if(r.type === 'rect') {
      if(mx >= r.x && mx <= r.x+r.w && my >= r.y && my <= r.y+r.h)
        return r;
    } else if(r.type === 'poly') {
      if(pointInPolygon(mx, my, r.points)) return r;
    }
  }
  return null;
}

function pointInPolygon(x, y, points) {
  let inside = false;
  for(let i=0,j=points.length-1; i<points.length; j=i++) {
    const xi=points[i].x, yi=points[i].y, xj=points[j].x, yj=points[j].y;
    if(((yi>y)!=(yj>y)) && (x < (xj-xi)*(y-yi)/(yj-yi)+xi)) inside=!inside;
  }
  return inside;
}

/* ════ MOUSE EVENTS ════ */
function getPos(e) {
  const c = getCanvas();
  const r = c.getBoundingClientRect();
  return { x: e.clientX - r.left, y: e.clientY - r.top };
}

function onMouseDown(e) {
  const {x,y} = getPos(e);

  if(mode === 'select') {
    // Check handle first
    if(selectedId) {
      const sel = rooms.find(r=>r.id===selectedId);
      if(sel) {
        const h = hitTestHandle(sel, x, y);
        if(h) {
          dragging = true;
          dragType = 'handle-' + h;
          dragStart = {x,y};
          dragOrigShape = JSON.parse(JSON.stringify(sel));
          return;
        }
      }
    }
    // Check room body
    const hit = hitTestRoom(x, y);
    if(hit) {
      selectedId = hit.id;
      dragging = true;
      dragType = 'move';
      dragStart = {x,y};
      dragOrigShape = JSON.parse(JSON.stringify(hit));
    } else {
      selectedId = null;
    }
    redraw();
    updateRoomList();
    return;
  }

  if(mode === 'rect') {
    drawing = true;
    drawStart = {x,y};
    drawCurrent = {x,y};
  }

  if(mode === 'poly') {
    if(polyPoints.length === 0) drawing = true;
    // Check if clicking near first point to close
    if(polyPoints.length >= 3) {
      const fp = polyPoints[0];
      if(Math.abs(x-fp.x)<12 && Math.abs(y-fp.y)<12) {
        closePoly();
        return;
      }
    }
    polyPoints.push({x,y});
    redraw();
  }
}

function onMouseMove(e) {
  const {x,y} = getPos(e);
  drawCurrent = {x,y};
  const c = getCanvas();

  if(mode === 'select' && !dragging) {
    // Update cursor
    if(selectedId) {
      const sel = rooms.find(r=>r.id===selectedId);
      if(sel) {
        const h = hitTestHandle(sel, x, y);
        if(h && h.startsWith('POLY-')) { c.style.cursor='move'; return; }
        if(h) { c.style.cursor=getCursorForHandle(h); return; }
      }
    }
    const hit = hitTestRoom(x,y);
    c.style.cursor = hit ? 'move' : 'default';
    return;
  }

  if(dragging && dragType) {
    const dx = x - dragStart.x;
    const dy = y - dragStart.y;
    const r = rooms.find(r=>r.id===selectedId);
    if(!r) return;

    if(dragType === 'move') {
      if(r.type === 'rect') {
        r.x = dragOrigShape.x + dx;
        r.y = dragOrigShape.y + dy;
      } else if(r.type === 'poly') {
        r.points = dragOrigShape.points.map(p=>({x:p.x+dx, y:p.y+dy}));
      }
    } else if(dragType.startsWith('handle-POLY-')) {
      const idx = parseInt(dragType.replace('handle-POLY-',''));
      r.points[idx] = {x: dragOrigShape.points[idx].x+dx, y: dragOrigShape.points[idx].y+dy};
    } else {
      // Rect handle resize
      const handle = dragType.replace('handle-','');
      const o = dragOrigShape;
      let {x:rx,y:ry,w:rw,h:rh} = o;
      if(handle.includes('E')) rw = Math.max(20, o.w + dx);
      if(handle.includes('S')) rh = Math.max(20, o.h + dy);
      if(handle.includes('W')) { rx = o.x + dx; rw = Math.max(20, o.w - dx); }
      if(handle.includes('N')) { ry = o.y + dy; rh = Math.max(20, o.h - dy); }
      r.x=rx; r.y=ry; r.w=rw; r.h=rh;
    }
    redraw();
    return;
  }

  if(drawing) redraw();
}

function onMouseUp(e) {
  if(dragging) {
    dragging = false; dragType = null; dragOrigShape = null;
    redraw(); return;
  }

  if(mode === 'rect' && drawing) {
    drawing = false;
    const {x,y} = getPos(e);
    const rx = Math.min(drawStart.x, x);
    const ry = Math.min(drawStart.y, y);
    const rw = Math.abs(x - drawStart.x);
    const rh = Math.abs(y - drawStart.y);
    if(rw < 10 || rh < 10) { redraw(); return; }
    pendingShape = {type:'rect', x:rx, y:ry, w:rw, h:rh};
    showNameModal('Name this room');
  }
}

function onDblClick(e) {
  if(mode === 'poly' && polyPoints.length >= 3) {
    closePoly();
  }
}

function closePoly() {
  if(polyPoints.length < 3) { polyPoints=[]; drawing=false; redraw(); return; }
  pendingShape = {type:'poly', points: [...polyPoints]};
  polyPoints = [];
  drawing = false;
  redraw();
  showNameModal('Name this area');
}

/* ════ NAME MODAL ════ */
function showNameModal(title) {
  document.getElementById('name-modal-title').textContent = title;
  document.getElementById('name-input').value = '';
  document.getElementById('name-modal').style.display = 'flex';
  setTimeout(()=>document.getElementById('name-input').focus(), 50);
}

document.getElementById('name-input').addEventListener('keydown', e => {
  if(e.key==='Enter') confirmName();
  if(e.key==='Escape') cancelNameModal();
});

function confirmName() {
  const name = document.getElementById('name-input').value.trim();
  if(!name) { document.getElementById('name-input').focus(); return; }
  document.getElementById('name-modal').style.display = 'none';
  if(!pendingShape) return;
  const room = { id:uid(), name, ...pendingShape };
  rooms.push(room);
  selectedId = room.id;
  pendingShape = null;
  redraw();
  updateRoomList();
}

function cancelNameModal() {
  document.getElementById('name-modal').style.display = 'none';
  pendingShape = null;
  redraw();
}

/* ════ MODE / TOOLS ════ */
function setMode(m) {
  mode = m;
  polyPoints = [];
  drawing = false;
  dragging = false;
  document.querySelectorAll('.tool-btn[id^="btn-"]').forEach(b=>b.classList.remove('active'));
  document.getElementById('btn-'+m)?.classList.add('active');
  const c = getCanvas();
  if(c) c.style.cursor = m==='select' ? 'default' : 'crosshair';
  const hints = {
    rect:'Drag to draw a rectangular room',
    poly:'Click to place points · Double-click or click first point to close · Esc to cancel',
    select:'Click a room to select · Drag to move · Drag handles to resize · Del to delete'
  };
  setHint(hints[m]||'');
  redraw();
}

function deleteSelected() {
  if(!selectedId) return;
  rooms = rooms.filter(r=>r.id!==selectedId);
  selectedId = null;
  redraw();
  updateRoomList();
}

function onKeyDown(e) {
  if(e.key==='Delete'||e.key==='Backspace') {
    if(document.activeElement.tagName!=='INPUT') deleteSelected();
  }
  if(e.key==='Escape') {
    if(mode==='poly'&&polyPoints.length>0){ polyPoints=[]; drawing=false; redraw(); }
    cancelNameModal();
  }
}

/* ════ ROOM LIST ════ */
function toggleRoomList() {
  document.getElementById('room-list-panel').classList.toggle('open');
}

function updateRoomList() {
  document.getElementById('room-count').textContent = rooms.length;
  const body = document.getElementById('rlp-body');
  if(!rooms.length){ body.innerHTML='<div style="font-size:12px;color:#aaa;padding:8px">No rooms yet</div>'; return; }
  body.innerHTML = rooms.map(r=>`
    <div class="room-list-item ${r.id===selectedId?'selected':''}" onclick="selectRoom('${r.id}')">
      <div class="rl-dot" style="background:${ROOM_COLOR}"></div>
      <span class="rl-name">${r.name}</span>
      <span style="font-size:10px;color:#aaa;margin-right:2px">${r.type==='poly'?'⬡':'▭'}</span>
      <button class="rl-del" onclick="event.stopPropagation();deleteRoom('${r.id}')">×</button>
    </div>`).join('');
}

function selectRoom(id) {
  selectedId = id;
  setMode('select');
  redraw();
  updateRoomList();
}

function deleteRoom(id) {
  rooms = rooms.filter(r=>r.id!==id);
  if(selectedId===id) selectedId=null;
  redraw();
  updateRoomList();
}

/* ════ SAVE ════ */
function saveRooms() {
  if(!rooms.length){ alert('No rooms drawn yet.'); return; }
  // In the main app this would save to the project.
  // For now show a summary.
  const summary = rooms.map(r=>`• ${r.name} (${r.type})`).join('\n');
  alert(`Saved ${rooms.length} room${rooms.length!==1?'s':''}:\n\n${summary}\n\nIn the main app these will become drop zones for assemblies.`);
}

/* ════ HELPERS ════ */
function setHint(html) {
  document.getElementById('tool-hint').innerHTML = html;
}
</script>
