<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>PDF Thumbnail Test v3</title>
<script src="https://cdn.jsdelivr.net/npm/pdfjs-dist@2.16.105/build/pdf.min.js"></script>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: -apple-system, sans-serif; padding: 20px; background: #f0efe9; }
h2 { margin-bottom: 8px; font-size: 18px; }
p { font-size: 13px; color: #666; margin-bottom: 16px; }
#status { margin: 10px 0; font-size: 13px; font-weight: 500; }

.thumb-grid {
  display: flex;
  flex-wrap: wrap;
  gap: 20px;
  margin-top: 16px;
}

.thumb-item {
  position: relative;
  width: 380px;
  border: 2px solid #ccc;
  border-radius: 8px;
  overflow: hidden;
  background: #fff;
  box-shadow: 0 2px 8px rgba(0,0,0,.12);
  cursor: grab;
  transition: border-color .15s, box-shadow .15s;
  flex-shrink: 0;
}
.thumb-item:hover {
  border-color: #185fa5;
  box-shadow: 0 4px 16px rgba(24,95,165,.25);
}

/* Canvas thumbnail */
.thumb-item canvas {
  display: block;
  width: 100%;
  height: auto;
}

.thumb-item .page-label {
  font-size: 12px;
  font-weight: 600;
  text-align: center;
  padding: 6px 4px;
  background: #fff;
  border-top: 1px solid #eee;
  color: #444;
}

.full-btn {
  position: absolute;
  top: 8px;
  right: 8px;
  background: rgba(24,95,165,.9);
  color: #fff;
  border: none;
  border-radius: 6px;
  padding: 6px 12px;
  font-size: 12px;
  font-weight: 500;
  cursor: pointer;
  opacity: 0;
  transition: opacity .15s;
  z-index: 2;
}
.thumb-item:hover .full-btn { opacity: 1; }

/* Full screen viewer */
#full-viewer {
  position: fixed;
  inset: 0;
  background: rgba(0,0,0,.85);
  z-index: 1000;
  display: none;
  flex-direction: column;
}
#full-viewer.open { display: flex; }
#viewer-bar {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 10px 20px;
  background: #1a1a18;
  color: #fff;
  flex-shrink: 0;
  gap: 12px;
}
#viewer-title { font-size: 14px; font-weight: 600; }
#viewer-iframe { flex: 1; border: none; background: #525659; }
</style>
</head>
<body>

<h2>PDF Thumbnail Test v3</h2>
<p>Sharp single-page thumbnails via PDF.js high-res canvas. Full view opens only the selected page.</p>

<input type="file" id="pdf-input" accept=".pdf">
<div id="status"></div>
<div class="thumb-grid" id="thumb-grid"></div>

<!-- Full screen viewer -->
<div id="full-viewer">
  <div id="viewer-bar">
    <span id="viewer-title">Page</span>
    <div style="display:flex;gap:10px;align-items:center">
      <span style="font-size:12px;color:#aaa">Press Escape to close</span>
      <button onclick="closeViewer()"
        style="background:#555;color:#fff;border:none;border-radius:6px;padding:6px 16px;cursor:pointer;font-size:13px">
        ✕ Close
      </button>
    </div>
  </div>
  <iframe id="viewer-iframe" src=""></iframe>
</div>

<script>
pdfjsLib.GlobalWorkerOptions.workerSrc =
  'https://cdn.jsdelivr.net/npm/pdfjs-dist@2.16.105/build/pdf.worker.min.js';

const status = document.getElementById('status');

// Store rendered page blobs for full view
const pageBlobs = {};
let pdf = null;

document.getElementById('pdf-input').addEventListener('change', async function(e) {
  const file = e.target.files[0];
  if (!file) return;

  status.textContent = 'Loading PDF...';
  status.style.color = '#333';
  document.getElementById('thumb-grid').innerHTML = '';
  Object.keys(pageBlobs).forEach(k => { URL.revokeObjectURL(pageBlobs[k]); delete pageBlobs[k]; });

  const arrayBuffer = await file.arrayBuffer();
  pdf = await pdfjsLib.getDocument({ data: new Uint8Array(arrayBuffer) }).promise;

  status.textContent = `${pdf.numPages} pages — rendering...`;

  for (let i = 1; i <= pdf.numPages; i++) {
    const page = await pdf.getPage(i);

    // Render at high res for sharp thumbnail
    const DISPLAY_WIDTH = 376; // matches thumb-item inner width
    const baseVp = page.getViewport({ scale: 1 });
    const scale = (DISPLAY_WIDTH * 2.5) / baseVp.width; // 2.5x pixel density
    const vp = page.getViewport({ scale });

    const c = document.createElement('canvas');
    c.width = Math.floor(vp.width);
    c.height = Math.floor(vp.height);
    await page.render({ canvasContext: c.getContext('2d'), viewport: vp }).promise;

    // Wrap item
    const item = document.createElement('div');
    item.className = 'thumb-item';
    item.draggable = true;
    item.dataset.page = i;

    const btn = document.createElement('button');
    btn.className = 'full-btn';
    btn.textContent = '⤢ Full view';
    btn.addEventListener('click', async (e) => {
      e.stopPropagation();
      await openViewer(i);
    });

    const lbl = document.createElement('div');
    lbl.className = 'page-label';
    lbl.textContent = 'Page ' + i;

    item.appendChild(c);
    item.appendChild(btn);
    item.appendChild(lbl);
    document.getElementById('thumb-grid').appendChild(item);

    status.textContent = `Rendered ${i} of ${pdf.numPages}...`;
  }

  status.textContent = `✓ Done — ${pdf.numPages} pages. Hover a thumbnail and click Full view.`;
  status.style.color = 'green';
});

// For full view: render the single page at full resolution to a canvas,
// then convert to a PNG blob and display in an img tag (no PDF multi-page issues)
async function openViewer(pageNum) {
  if (!pdf) return;

  document.getElementById('viewer-title').textContent = 'Page ' + pageNum + ' — loading...';
  document.getElementById('full-viewer').classList.add('open');
  document.getElementById('viewer-iframe').src = '';

  const page = await pdf.getPage(pageNum);

  // Render at very high res for full view
  const vp = page.getViewport({ scale: 4.0 });
  const c = document.createElement('canvas');
  c.width = Math.floor(vp.width);
  c.height = Math.floor(vp.height);
  await page.render({ canvasContext: c.getContext('2d'), viewport: vp }).promise;

  // Convert to blob and show in iframe as image
  c.toBlob(blob => {
    const url = URL.createObjectURL(blob);
    // Use an img inside the iframe area instead of an iframe
    const existing = document.getElementById('viewer-img-wrap');
    if (existing) existing.remove();

    const wrap = document.createElement('div');
    wrap.id = 'viewer-img-wrap';
    wrap.style.cssText = 'flex:1;overflow:auto;background:#525659;display:flex;align-items:flex-start;justify-content:center;padding:20px';
    const img = document.createElement('img');
    img.src = url;
    img.style.cssText = 'max-width:100%;height:auto;box-shadow:0 4px 20px rgba(0,0,0,.4);background:#fff';
    wrap.appendChild(img);

    // Insert after viewer bar
    const viewer = document.getElementById('full-viewer');
    const iframe = document.getElementById('viewer-iframe');
    iframe.style.display = 'none';
    viewer.appendChild(wrap);

    document.getElementById('viewer-title').textContent = 'Page ' + pageNum;
  }, 'image/png');
}

function closeViewer() {
  document.getElementById('full-viewer').classList.remove('open');
  const wrap = document.getElementById('viewer-img-wrap');
  if (wrap) wrap.remove();
  document.getElementById('viewer-iframe').style.display = '';
}

document.getElementById('full-viewer').addEventListener('click', function(e) {
  if (e.target === this) closeViewer();
});
document.addEventListener('keydown', e => { if (e.key === 'Escape') closeViewer(); });
</script>
</body>
</html>
