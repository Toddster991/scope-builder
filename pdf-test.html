<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>PDF Thumbnail Test</title>
<style>
body { font-family: sans-serif; padding: 20px; background: #f0efe9; }
h2 { margin-bottom: 16px; }
#status { margin: 10px 0; font-size: 13px; color: #333; }
.thumb-grid { display: flex; flex-wrap: wrap; gap: 16px; margin-top: 16px; }

/* APPROACH A — iframe native rendering */
.thumb-iframe {
  position: relative;
  width: 400px;
  height: 520px;
  border: 2px solid #ccc;
  border-radius: 8px;
  overflow: hidden;
  background: #fff;
  box-shadow: 0 2px 8px rgba(0,0,0,.1);
  cursor: grab;
}
.thumb-iframe iframe {
  width: 100%;
  height: 100%;
  border: none;
  pointer-events: none; /* allows drag on parent */
}
.thumb-iframe .drag-handle {
  position: absolute;
  inset: 0;
  cursor: grab;
  z-index: 2;
}
.thumb-iframe .page-label {
  position: absolute;
  bottom: 0;
  left: 0;
  right: 0;
  background: rgba(255,255,255,.92);
  font-size: 12px;
  font-weight: 500;
  text-align: center;
  padding: 4px;
  border-top: 1px solid #eee;
  z-index: 3;
}

/* APPROACH B — PDF.js canvas high-res */
.thumb-canvas {
  width: 400px;
  border: 2px solid #ccc;
  border-radius: 8px;
  overflow: hidden;
  background: #fff;
  box-shadow: 0 2px 8px rgba(0,0,0,.1);
}
.thumb-canvas canvas {
  display: block;
  width: 100%;
  height: auto;
}
.thumb-canvas .page-label {
  font-size: 12px;
  font-weight: 500;
  text-align: center;
  padding: 4px;
  background: #fff;
  border-top: 1px solid #eee;
}

.section-title {
  font-size: 14px;
  font-weight: 600;
  margin: 24px 0 8px;
  padding-bottom: 6px;
  border-bottom: 1px solid #ccc;
}
</style>
</head>
<body>

<h2>PDF Thumbnail Quality Test</h2>
<input type="file" id="pdf-input" accept=".pdf">
<div id="status"></div>

<div class="section-title">Approach A — Native browser iframe (no canvas)</div>
<div class="thumb-grid" id="grid-iframe"></div>

<div class="section-title">Approach B — PDF.js canvas at scale 3.0</div>
<div class="thumb-grid" id="grid-canvas"></div>

<script src="https://cdn.jsdelivr.net/npm/pdfjs-dist@2.16.105/build/pdf.min.js"></script>
<script>
pdfjsLib.GlobalWorkerOptions.workerSrc = 'https://cdn.jsdelivr.net/npm/pdfjs-dist@2.16.105/build/pdf.worker.min.js';

const status = document.getElementById('status');

document.getElementById('pdf-input').addEventListener('change', async function(e) {
  const file = e.target.files[0];
  if (!file) return;

  status.textContent = 'Loading...';
  document.getElementById('grid-iframe').innerHTML = '';
  document.getElementById('grid-canvas').innerHTML = '';

  const arrayBuffer = await file.arrayBuffer();

  // ── APPROACH A: iframe native rendering ──
  const blob = new Blob([arrayBuffer.slice(0)], { type: 'application/pdf' });
  const blobUrl = URL.createObjectURL(blob);

  // We need page count — use PDF.js just for that
  const pdfForCount = await pdfjsLib.getDocument({ data: new Uint8Array(arrayBuffer.slice(0)) }).promise;
  const numPages = pdfForCount.numPages;

  status.textContent = `${numPages} pages — rendering both approaches...`;

  for (let i = 1; i <= Math.min(numPages, 6); i++) {
    const wrap = document.createElement('div');
    wrap.className = 'thumb-iframe';
    wrap.innerHTML = `
      <iframe src="${blobUrl}#page=${i}&toolbar=0&navpanes=0&scrollbar=0&view=FitH"></iframe>
      <div class="drag-handle"></div>
      <button onclick="openFullPage('${blobUrl}',${i})" style="position:absolute;top:6px;right:6px;z-index:4;background:rgba(0,0,0,.55);color:#fff;border:none;border-radius:6px;padding:4px 8px;font-size:11px;cursor:pointer;display:flex;align-items:center;gap:4px">
        <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M15 3h6v6M9 21H3v-6M21 3l-7 7M3 21l7-7"/></svg>
        Full view
      </button>
      <div class="page-label">Page ${i} — iframe</div>
    `;
    document.getElementById('grid-iframe').appendChild(wrap);
  }

  // Full page viewer modal
  window.openFullPage = function(url, pageNum) {
    // Remove any existing viewer
    document.getElementById('full-viewer')?.remove();
    const overlay = document.createElement('div');
    overlay.id = 'full-viewer';
    overlay.style.cssText = 'position:fixed;inset:0;background:rgba(0,0,0,.75);z-index:1000;display:flex;flex-direction:column';
    overlay.innerHTML = `
      <div style="display:flex;align-items:center;justify-content:space-between;padding:10px 16px;background:#1a1a18;color:#fff;flex-shrink:0">
        <span style="font-size:14px;font-weight:600">Page ${pageNum}</span>
        <div style="display:flex;gap:8px">
          <a href="${url}#page=${pageNum}" target="_blank" style="color:#93c5fd;font-size:12px;text-decoration:none;padding:4px 10px;border:1px solid #3b82f6;border-radius:6px">Open in new tab</a>
          <button onclick="document.getElementById('full-viewer').remove()" style="background:#444;color:#fff;border:none;border-radius:6px;padding:4px 12px;cursor:pointer;font-size:13px">✕ Close</button>
        </div>
      </div>
      <iframe src="${url}#page=${pageNum}&toolbar=1&navpanes=0" style="flex:1;border:none;background:#fff"></iframe>
    `;
    // Click backdrop to close
    overlay.addEventListener('click', e => { if(e.target === overlay) overlay.remove(); });
    document.body.appendChild(overlay);
  };

  // ── APPROACH B: PDF.js canvas ──
  const pdf = await pdfjsLib.getDocument({ data: new Uint8Array(arrayBuffer) }).promise;

  for (let i = 1; i <= Math.min(numPages, 6); i++) {
    const page = await pdf.getPage(i);
    const vp = page.getViewport({ scale: 3.0 });
    const c = document.createElement('canvas');
    c.width = Math.floor(vp.width);
    c.height = Math.floor(vp.height);
    await page.render({ canvasContext: c.getContext('2d'), viewport: vp }).promise;

    const wrap = document.createElement('div');
    wrap.className = 'thumb-canvas';
    const lbl = document.createElement('div');
    lbl.className = 'page-label';
    lbl.textContent = `Page ${i} — PDF.js`;
    wrap.appendChild(c);
    wrap.appendChild(lbl);
    document.getElementById('grid-canvas').appendChild(wrap);
  }

  status.textContent = `Done — ${Math.min(numPages, 6)} pages rendered. Compare quality above.`;
  status.style.color = 'green';
});
</script>
</body>
</html>
