<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Sheet Assignment Test</title>
<script src="https://cdn.jsdelivr.net/npm/pdfjs-dist@2.16.105/build/pdf.min.js"></script>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;background:#f0efe9;height:100vh;overflow:hidden;display:flex;flex-direction:column}

.topbar{background:#fff;border-bottom:1px solid rgba(0,0,0,.12);padding:0 20px;height:48px;display:flex;align-items:center;justify-content:space-between;flex-shrink:0}
.topbar h1{font-size:15px;font-weight:700}
.topbar .hint{font-size:12px;color:#888}

.workspace{flex:1;display:grid;grid-template-columns:1fr 360px;overflow:hidden;gap:0}

/* LEFT — thumbnails */
.thumb-panel{background:#f7f7f5;border-right:1px solid rgba(0,0,0,.12);display:flex;flex-direction:column;overflow:hidden}
.thumb-panel-head{padding:12px 16px;border-bottom:1px solid rgba(0,0,0,.12);background:#fff;flex-shrink:0}
.thumb-panel-title{font-size:13px;font-weight:600;color:#1a1a18;margin-bottom:2px}
.thumb-panel-sub{font-size:11px;color:#888}
.thumb-grid{flex:1;overflow-y:auto;padding:16px;display:grid;grid-template-columns:repeat(auto-fill,minmax(280px,1fr));gap:14px;align-content:start}

.thumb-item{
  position:relative;border:2px solid #ddd;border-radius:8px;overflow:hidden;
  background:#fff;box-shadow:0 1px 4px rgba(0,0,0,.1);
  cursor:grab;transition:border-color .15s,box-shadow .15s,opacity .2s;
  user-select:none;
}
.thumb-item:hover{border-color:#185fa5;box-shadow:0 3px 12px rgba(24,95,165,.2)}
.thumb-item.assigned{opacity:0.45}
.thumb-item.dragging-active{opacity:0.3;border-color:#185fa5}
.thumb-item canvas{display:block;width:100%;height:auto}
.thumb-item .page-label{font-size:11px;font-weight:600;color:#555;text-align:center;padding:5px 4px;background:#fff;border-top:1px solid #eee}
.thumb-item .assigned-badge{
  position:absolute;top:0;left:0;right:0;
  background:rgba(24,95,165,.88);color:#fff;
  font-size:10px;font-weight:600;padding:4px 8px;
  text-align:center;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;
  display:none;
}
.thumb-item.assigned .assigned-badge{display:block}
.thumb-item .view-btn{
  position:absolute;bottom:28px;right:6px;
  background:rgba(0,0,0,.55);color:#fff;border:none;border-radius:5px;
  padding:3px 8px;font-size:10px;cursor:pointer;opacity:0;transition:opacity .15s;
}
.thumb-item:hover .view-btn{opacity:1}

/* RIGHT — categories */
.cat-panel{background:#fff;overflow-y:auto}
.cat-panel-head{padding:12px 16px;border-bottom:1px solid rgba(0,0,0,.12);font-size:13px;font-weight:600;color:#1a1a18;position:sticky;top:0;background:#fff;z-index:1}
.cat-group{padding:10px 14px 4px}
.cat-group-label{font-size:10px;font-weight:700;color:#9a9994;text-transform:uppercase;letter-spacing:.07em;margin-bottom:6px;padding-bottom:4px;border-bottom:0.5px solid rgba(0,0,0,.1)}

.drop-row{
  display:flex;align-items:center;gap:6px;
  padding:6px 8px;border-radius:6px;margin-bottom:4px;
  border:1.5px solid rgba(0,0,0,.1);background:#f7f7f5;
  transition:all .15s;min-height:36px;
}
.drop-row.drag-over{background:#e6f1fb;border-color:#185fa5;border-style:solid}
.drop-row .cat-dot{width:9px;height:9px;border-radius:50%;flex-shrink:0}
.drop-row .cat-name{font-size:12px;font-weight:500;color:#1a1a18;flex:1;min-width:0;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.drop-row .assignment{display:flex;align-items:center;gap:4px;flex-shrink:0}
.drop-row .pg-badge{font-size:11px;font-weight:600;padding:2px 7px;border-radius:10px;white-space:nowrap}
.drop-row .unassign-btn{background:none;border:none;cursor:pointer;color:#9a9994;font-size:14px;line-height:1;padding:0 2px}
.drop-row .unassign-btn:hover{color:#a32d2d}
.drop-row .drop-hint{font-size:10px;color:#bbb;white-space:nowrap}
.drop-row.assigned{border-color:transparent;background:#f0f8f0}

/* Full view overlay */
#full-viewer{position:fixed;inset:0;background:rgba(0,0,0,.85);z-index:100;display:none;flex-direction:column}
#full-viewer.open{display:flex}
.viewer-bar{padding:10px 20px;background:#1a1a18;color:#fff;display:flex;align-items:center;justify-content:space-between;flex-shrink:0}
.viewer-body{flex:1;overflow:auto;background:#525659;display:flex;align-items:flex-start;justify-content:center;padding:20px}
.viewer-body img{max-width:100%;height:auto;box-shadow:0 4px 24px rgba(0,0,0,.5);background:#fff}

/* Upload state */
.upload-zone{margin:20px;border:2px dashed #ccc;border-radius:12px;padding:40px;text-align:center;cursor:pointer;transition:all .15s;background:#fff}
.upload-zone:hover{border-color:#185fa5;background:#e6f1fb}
.upload-icon{font-size:36px;color:#ccc;margin-bottom:10px}
.upload-label{font-size:14px;font-weight:500;color:#555}
.upload-hint{font-size:12px;color:#888;margin-top:4px}

.spinner{display:inline-block;width:14px;height:14px;border:2px solid rgba(0,0,0,.1);border-top-color:#185fa5;border-radius:50%;animation:spin .7s linear infinite;vertical-align:middle;margin-right:6px}
@keyframes spin{to{transform:rotate(360deg)}}
</style>
</head>
<body>

<div class="topbar">
  <h1>Sheet Assignment Test</h1>
  <span class="hint" id="topbar-hint">Upload a plan set PDF to begin</span>
</div>

<div class="workspace">
  <!-- LEFT -->
  <div class="thumb-panel">
    <div class="thumb-panel-head">
      <div class="thumb-panel-title" id="panel-title">Plan Set Pages</div>
      <div class="thumb-panel-sub" id="panel-sub">Upload a PDF to see page thumbnails</div>
    </div>
    <div class="thumb-grid" id="thumb-grid">
      <div class="upload-zone" onclick="document.getElementById('pdf-input').click()">
        <div class="upload-icon">📄</div>
        <div class="upload-label">Click to upload plan set PDF</div>
        <div class="upload-hint">All floors, elevations, site plan in one file</div>
      </div>
    </div>
  </div>

  <!-- RIGHT -->
  <div class="cat-panel">
    <div class="cat-panel-head">Drawing Categories</div>
    <div id="cat-list"></div>
  </div>
</div>

<!-- Full view -->
<div id="full-viewer">
  <div class="viewer-bar">
    <span id="viewer-title" style="font-size:14px;font-weight:600"></span>
    <button onclick="closeViewer()" style="background:#555;color:#fff;border:none;border-radius:6px;padding:6px 16px;cursor:pointer;font-size:13px">✕ Close</button>
  </div>
  <div class="viewer-body" id="viewer-body"></div>
</div>

<input type="file" id="pdf-input" accept=".pdf" style="display:none">

<script>
pdfjsLib.GlobalWorkerOptions.workerSrc = 'https://cdn.jsdelivr.net/npm/pdfjs-dist@2.16.105/build/pdf.worker.min.js';

/* ── Categories ── */
const GROUPS = [
  { label:'Existing', cats:[
    {id:'existing-plans',      name:'Existing Plans',          color:'#5F5E5A'},
    {id:'existing-elevations', name:'Existing Elevations',     color:'#5F5E5A'},
  ]},
  { label:'Proposed', cats:[
    {id:'floors',              name:'Floor Plans',             color:'#185FA5'},
    {id:'elevations',          name:'Elevations',              color:'#534AB7'},
    {id:'site',                name:'Site Plan',               color:'#3B6D11'},
    {id:'interior-elevations', name:'Interior Elevations',     color:'#D4537E'},
  ]},
  { label:'Engineering', cats:[
    {id:'electrical',          name:'Electrical Plans',        color:'#EF9F27'},
    {id:'mechanical',          name:'Mechanical / Plumbing',   color:'#1D9E75'},
    {id:'structural',          name:'Structural',              color:'#712B13'},
  ]},
  { label:'Other', cats:[
    {id:'landscape',           name:'Landscape',               color:'#3B6D11'},
    {id:'details',             name:'Details',                 color:'#888780'},
    {id:'sections',            name:'Sections',                color:'#888780'},
    {id:'schedules',           name:'Door / Window Schedules', color:'#083344'},
  ]},
];

/* ── State ── */
let pdfDoc = null;
let assignments = {}; // catId -> pageIndex (0-based)
let draggingPage = null;

/* ── Build category list ── */
function buildCatList() {
  const list = document.getElementById('cat-list');
  let html = '';
  GROUPS.forEach(g => {
    html += `<div class="cat-group">
      <div class="cat-group-label">${g.label}</div>`;
    g.cats.forEach(cat => {
      const assigned = assignments[cat.id] !== undefined;
      const pg = assigned ? 'Page ' + (assignments[cat.id] + 1) : null;
      const rgb = hexToRgb(cat.color);
      html += `<div class="drop-row ${assigned?'assigned':''}" id="drop-${cat.id}"
        data-cat="${cat.id}"
        ondragover="onDragOver(event,this)"
        ondragleave="onDragLeave(this)"
        ondrop="onDrop(event,'${cat.id}')">
        <div class="cat-dot" style="background:${cat.color}"></div>
        <div class="cat-name">${cat.name}</div>
        <div class="assignment">
          ${pg
            ? `<span class="pg-badge" style="background:rgba(${rgb},.15);color:${cat.color}">${pg}</span>
               <button class="unassign-btn" onclick="unassign('${cat.id}')" title="Remove">×</button>`
            : `<span class="drop-hint">drop here</span>`
          }
        </div>
      </div>`;
    });
    html += '</div>';
  });
  list.innerHTML = html;
}

function hexToRgb(hex) {
  const r=parseInt(hex.slice(1,3),16),g=parseInt(hex.slice(3,5),16),b=parseInt(hex.slice(5,7),16);
  return `${r},${g},${b}`;
}

/* ── Drag handlers ── */
function onDragOver(e, el) {
  e.preventDefault();
  el.classList.add('drag-over');
}
function onDragLeave(el) {
  el.classList.remove('drag-over');
}
function onDrop(e, catId) {
  e.preventDefault();
  const el = document.getElementById('drop-' + catId);
  el.classList.remove('drag-over');
  const pageIdx = parseInt(e.dataTransfer.getData('text/plain'));
  if (isNaN(pageIdx)) return;
  assignments[catId] = pageIdx;
  buildCatList();
  updateThumbStates();
}
function unassign(catId) {
  delete assignments[catId];
  buildCatList();
  updateThumbStates();
}

function updateThumbStates() {
  const assignedPages = new Set(Object.values(assignments));
  const labels = {};
  Object.entries(assignments).forEach(([catId, pg]) => {
    if (!labels[pg]) labels[pg] = [];
    const cat = GROUPS.flatMap(g=>g.cats).find(c=>c.id===catId);
    if (cat) labels[pg].push(cat.name);
  });
  document.querySelectorAll('.thumb-item').forEach(item => {
    const pg = parseInt(item.dataset.page);
    const badge = item.querySelector('.assigned-badge');
    if (assignedPages.has(pg)) {
      item.classList.add('assigned');
      if (badge) badge.textContent = (labels[pg] || []).join(', ');
    } else {
      item.classList.remove('assigned');
      if (badge) badge.textContent = '';
    }
  });
}

/* ── PDF Upload ── */
document.getElementById('pdf-input').addEventListener('change', async function(e) {
  const file = e.target.files[0];
  if (!file) return;
  assignments = {};

  document.getElementById('thumb-grid').innerHTML =
    '<div style="grid-column:1/-1;padding:20px;font-size:13px;color:#888"><span class="spinner"></span>Loading PDF...</div>';
  document.getElementById('panel-title').textContent = file.name;
  document.getElementById('topbar-hint').textContent = 'Drag page thumbnails onto categories on the right';

  const arrayBuffer = await file.arrayBuffer();
  pdfDoc = await pdfjsLib.getDocument({ data: new Uint8Array(arrayBuffer) }).promise;

  document.getElementById('panel-sub').textContent =
    pdfDoc.numPages + ' pages — drag onto categories →';
  document.getElementById('thumb-grid').innerHTML = '';
  buildCatList();

  for (let i = 1; i <= pdfDoc.numPages; i++) {
    const page = await pdfDoc.getPage(i);
    const baseVp = page.getViewport({ scale: 1 });
    const DISPLAY = 276;
    const scale = (DISPLAY * 2.5) / baseVp.width;
    const vp = page.getViewport({ scale });
    const c = document.createElement('canvas');
    c.width = Math.floor(vp.width);
    c.height = Math.floor(vp.height);
    await page.render({ canvasContext: c.getContext('2d'), viewport: vp }).promise;

    const item = document.createElement('div');
    item.className = 'thumb-item';
    item.draggable = true;
    item.dataset.page = String(i - 1);

    item.addEventListener('dragstart', ev => {
      draggingPage = i - 1;
      ev.dataTransfer.setData('text/plain', String(i - 1));
      ev.dataTransfer.effectAllowed = 'copy';
      item.classList.add('dragging-active');
    });
    item.addEventListener('dragend', () => {
      item.classList.remove('dragging-active');
      draggingPage = null;
    });

    const badge = document.createElement('div');
    badge.className = 'assigned-badge';

    const viewBtn = document.createElement('button');
    viewBtn.className = 'view-btn';
    viewBtn.textContent = '⤢ Full view';
    viewBtn.addEventListener('click', async ev => {
      ev.stopPropagation();
      await openViewer(i);
    });

    const lbl = document.createElement('div');
    lbl.className = 'page-label';
    lbl.textContent = 'Page ' + i;

    item.appendChild(badge);
    item.appendChild(c);
    item.appendChild(viewBtn);
    item.appendChild(lbl);
    document.getElementById('thumb-grid').appendChild(item);
  }

  document.getElementById('topbar-hint').textContent =
    pdfDoc.numPages + ' pages loaded — drag onto categories →';
  this.value = '';
});

/* ── Full view ── */
async function openViewer(pageNum) {
  if (!pdfDoc) return;
  document.getElementById('viewer-title').textContent = 'Page ' + pageNum + ' — rendering...';
  document.getElementById('viewer-body').innerHTML = '<div style="color:#fff;padding:40px;font-size:13px"><span class="spinner"></span>Rendering full resolution...</div>';
  document.getElementById('full-viewer').classList.add('open');

  const page = await pdfDoc.getPage(pageNum);
  const vp = page.getViewport({ scale: 4.0 });
  const c = document.createElement('canvas');
  c.width = Math.floor(vp.width);
  c.height = Math.floor(vp.height);
  await page.render({ canvasContext: c.getContext('2d'), viewport: vp }).promise;

  c.toBlob(blob => {
    const url = URL.createObjectURL(blob);
    const img = document.createElement('img');
    img.src = url;
    document.getElementById('viewer-body').innerHTML = '';
    document.getElementById('viewer-body').appendChild(img);
    document.getElementById('viewer-title').textContent = 'Page ' + pageNum;
  }, 'image/png');
}

function closeViewer() {
  document.getElementById('full-viewer').classList.remove('open');
  document.getElementById('viewer-body').innerHTML = '';
}

document.getElementById('full-viewer').addEventListener('click', function(e) {
  if (e.target === this || e.target === document.getElementById('viewer-body')) closeViewer();
});
document.addEventListener('keydown', e => { if (e.key === 'Escape') closeViewer(); });

/* ── Init ── */
buildCatList();
</script>
</body>
</html>
